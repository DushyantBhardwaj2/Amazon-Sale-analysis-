services:
  - type: web
    name: amazon-sales-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --app-dir backend --host 0.0.0.0 --port $PORT
    envVars:
      - key: USE_SPARK_BACKEND
        value: "0"
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: amazon-sales-frontend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r frontend/requirements.txt
    startCommand: streamlit run frontend/app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true
    envVars:
      - key: SALES_API_BASE
        value: https://amazon-sales-backend.onrender.com
      - key: STREAMLIT_BROWSER_GATHER_USAGE_STATS
        value: "false"
